name: Finalize FORGE Milestone 5

on:
  push:
    paths:
      - '.github/forge-m5-trigger.txt'

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build audited final showroom
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          source_path = Path('showcases/forge-rpg-studio-milestone-5.html')
          target_path = Path('showcases/forge-rpg-studio-milestone-5-final.html')
          text = source_path.read_text(encoding='utf-8')

          text = text.replace(
              '<title>FORGE RPG Studio — Milestone 5</title>',
              '<title>FORGE RPG Studio — Milestone 5 Final</title>'
          )
          text = text.replace(
              '<small>MILESTONE 5 · PRODUCTION HARDENING</small>',
              '<small>MILESTONE 5 FINAL · PRODUCTION HARDENING</small>'
          )
          text = text.replace(
              'animation: orbit-spin calc(23s / max(var(--motion-scale), .01)) linear infinite;',
              'animation: orbit-spin 23s linear infinite;'
          )
          text = text.replace(
              'animation: orbit-spin calc(14s / max(var(--motion-scale), .01)) linear infinite reverse;',
              'animation: orbit-spin 14s linear infinite reverse;'
          )

          source_close = '''        <pre class="source-viewer" id="source-viewer"></pre>
      </div>
    </article>

    <article class="exhibit wide">
      <header class="exhibit-head">
        <span class="exhibit-num">13</span>
        <div><h3>Versioned State Inspector</h3><p>Current authoritative state, recent commands, autosave metadata, settings, tests, profiler readings, and recovery health.</p></div>
      </header>
      <div class="exhibit-body"><pre class="debug-output" id="state-inspector"></pre></div>
    </article>'''
          source_merge = '''        <pre class="source-viewer" id="source-viewer"></pre>
      </div>
      <div class="exhibit-body" style="border-top:1px solid rgba(255,255,255,.06)">
        <div class="toolbar"><h4 style="margin:0">Live State Inspector</h4><span class="chip info">Schema 7</span></div>
        <pre class="debug-output" id="state-inspector" style="margin-top:9px"></pre>
      </div>
    </article>'''
          if source_close not in text:
              raise SystemExit('Could not locate exhibit 12/13 merge boundary')
          text = text.replace(source_close, source_merge)

          marker = 'function resolveAbility(actor, ability, targetId, events, sourceCombat = state.combat) {'
          if marker not in text:
              raise SystemExit('Could not locate resolveAbility')
          text = text.replace(marker, 'let combatSimulationMode = false;\n\n' + marker, 1)
          text = text.replace(
              'if (sourceCombat === state.combat) setTimeout(() => advanceTurn(), state.settings.motion === "reduced" ? 40 : 520);',
              'if (sourceCombat === state.combat && !combatSimulationMode) setTimeout(() => advanceTurn(), state.settings.motion === "reduced" ? 40 : 520);'
          )
          text = text.replace(
              'function simulateCombat(seed) {\n  const localState = clone(state);',
              'function simulateCombat(seed) {\n  combatSimulationMode = true;\n  const localState = clone(state);'
          )
          text = text.replace(
              '  state = previousState;\n  return result;\n}',
              '  state = previousState;\n  combatSimulationMode = false;\n  return result;\n}',
              1
          )

          old_victory = '''  if (event.type === "COMBAT_VICTORY") {
    playSound("victory");
    flashScreen("#f1c75b");
    grantXp(120, []);
    dispatch("ADD_ITEM", { item: generateItem(`victory:${state.combat.seed}`), quantity: 1 });
    announce("Combat victory. Rewards added.");
  }'''
          new_victory = '''  if (event.type === "COMBAT_VICTORY") {
    playSound("victory");
    flashScreen("#f1c75b");
    const rewardEvents = [];
    grantXp(120, rewardEvents);
    rewardEvents.forEach(publish);
    dispatch("ADD_ITEM", { item: generateItem(`victory:${state.combat.seed}`), quantity: 1 });
    announce("Combat victory. Rewards added.");
  }'''
          if old_victory not in text:
              raise SystemExit('Could not locate combat victory subscriber')
          text = text.replace(old_victory, new_victory)

          old_frame_prelude = '''let animationHandle = 0;

function animationFrame(timestamp) {'''
          new_frame_prelude = '''let animationHandle = 0;
let productionUiAccumulator = 0;

function animationFrame(timestamp) {'''
          text = text.replace(old_frame_prelude, new_frame_prelude)

          old_frame = '''  worldRuntime.time += delta;
  worldRuntime.transition = Math.max(0, worldRuntime.transition - delta * 2.5);
  audio.level = Math.max(0, audio.level - delta * .55);
  stressWork();
  if (!document.hidden) {
    drawFirstPerson();
    renderAudio();
    renderProfiler();
  }
  animationHandle = requestAnimationFrame(animationFrame);'''
          new_frame = '''  worldRuntime.time += delta;
  worldRuntime.transition = Math.max(0, worldRuntime.transition - delta * 2.5);
  audio.level = Math.max(0, audio.level - delta * .55);
  productionUiAccumulator += delta;
  stressWork();
  if (!document.hidden) {
    drawFirstPerson();
    if (productionUiAccumulator >= .2) {
      productionUiAccumulator = 0;
      renderAudio();
      renderProfiler();
    }
  }
  animationHandle = requestAnimationFrame(animationFrame);'''
          if old_frame not in text:
              raise SystemExit('Could not locate animation frame body')
          text = text.replace(old_frame, new_frame)

          text = text.replace(
              'const random = seededRandom(sourceCombat.seed + sourceCombat.round * 101 + sourceCombat.index * 17 + hashString(ability.id));\n',
              ''
          )

          text = text.replace(
              '  const localState = clone(state);\n  const previousState = state;\n  state = localState;',
              '  const localState = clone(state);\n  const previousState = state;\n  state = localState;',
              1
          )

          if text.count('class="exhibit-num"') != 12:
              raise SystemExit(f'Expected 12 exhibits, found {text.count(chr(99)+chr(108)+chr(97)+chr(115)+chr(115)+chr(61)+chr(34)+chr(101)+chr(120)+chr(104)+chr(105)+chr(98)+chr(105)+chr(116)+chr(45)+chr(110)+chr(117)+chr(109)+chr(34))}')
          if 'combatSimulationMode = false;' not in text:
              raise SystemExit('Simulation guard missing')
          if 'productionUiAccumulator >= .2' not in text:
              raise SystemExit('Profiler throttle missing')
          if not text.rstrip().endswith('</html>'):
              raise SystemExit('Document is incomplete')

          target_path.write_text(text, encoding='utf-8')
          print(f'Wrote {target_path} with {text.count(chr(10)) + 1} lines')
          PY

      - name: Commit final showroom
        shell: bash
        run: |
          git config user.name "FORGE Build Bot"
          git config user.email "actions@users.noreply.github.com"
          git add showcases/forge-rpg-studio-milestone-5-final.html
          if git diff --cached --quiet; then
            echo "No finalization changes required"
          else
            git commit -m "Finalize FORGE RPG Studio Milestone 5"
            git push
          fi
